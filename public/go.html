<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Holy Grails</title>
<style>html,body{height:100%;margin:0;background:#0C1A2E}</style>
</head>
<body>
<script>
/* Same-origin redirector for outbound Discogs links. Tapping a raw
   discogs.com link in the installed PWA triggers the Discogs app's iOS
   Universal Link and strands the user on its home screen. A same-origin
   tap followed by a programmatic replace() is not treated as a link tap,
   so the user lands on Discogs mobile web instead. */
(function () {
  var u = new URLSearchParams(location.search).get("u") || "";
  if (u.indexOf("https://www.discogs.com/") === 0) {
    location.replace(u);
  } else {
    location.replace("/");
  }
})();
</script>
</body>
</html>
